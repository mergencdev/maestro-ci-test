image: mingc/android-build-box:latest

# Bitbucket native notifications are managed in Bitbucket settings.
# Fixed recipient lists cannot be declared in this YAML.
pipelines:
  pull-requests:
    "**":
      - step:
          name: Build Debug APK
          caches:
            - gradle
          script:
            - |
              if [ "${BITBUCKET_PR_DESTINATION_BRANCH:-}" != "main" ]; then
                echo "Skipping PR pipeline because destination branch is '${BITBUCKET_PR_DESTINATION_BRANCH:-unknown}'."
                exit 0
              fi
            - chmod +x gradlew
            - ./gradlew assembleDebug
          artifacts:
            - app/build/outputs/apk/debug/*.apk

      - step:
          name: Run Maestro Cloud Tests
          script:
            - |
              if [ "${BITBUCKET_PR_DESTINATION_BRANCH:-}" != "main" ]; then
                echo "Skipping Maestro because destination branch is '${BITBUCKET_PR_DESTINATION_BRANCH:-unknown}'."
                exit 0
              fi
            - curl -Ls "https://get.maestro.mobile.dev" | bash
            - export PATH="$PATH:$HOME/.maestro/bin"
            - |
              bash -o pipefail -c '
                maestro cloud \
                  --verbose \
                  --apiKey "$MAESTRO_API_KEY" \
                  --app-file app/build/outputs/apk/debug/app-debug.apk \
                  .maestro/ 2>&1 | tee maestro-output.log
              '
              STATUS=$?
              echo "Maestro Console URL:"
              grep -Eo 'https://[^[:space:]]+' maestro-output.log | tail -1 || true
              exit "$STATUS"
          artifacts:
            - maestro-output.log
