image: mingc/android-build-box:latest

pipelines:
  branches:
    main:
      - step:
          name: Build Debug APK
          caches:
            - gradle
          script:
            - chmod +x gradlew
            - ./gradlew assembleDebug
          artifacts:
            - app/build/outputs/apk/debug/*.apk

      - step:
          name: Run Maestro Cloud Tests
          script:
            - curl -Ls "https://get.maestro.mobile.dev" | bash
            - export PATH="$PATH:$HOME/.maestro/bin"
            - |
              maestro cloud \
                --apiKey $MAESTRO_API_KEY \
                --app-file app/build/outputs/apk/debug/app-debug.apk \
                --include-tags all \
                .maestro/ 2>&1 | tee maestro-output.log
              RESULT=$?
              echo "========================================="
              echo "MAESTRO CONSOLE URL:"
              grep -oP 'https://[^ ]*maestro[^ ]*' maestro-output.log || true
              echo "========================================="
              exit $RESULT
          after-script:
            - cat maestro-output.log 2>/dev/null || true
