##
# @file    maestro.yml
# @appId   com.mergenc.maestro_ci_test
#
# @tags
#  - ci
#  - github-actions
#
# @description
#  main branch'e push/PR sonrası Maestro UI testlerini
#  headless emulator üzerinde koşar. Her test için detaylı
#  pass/fail raporu üretir, fail durumunda screenshot/video
#  ve hata mesajları loglanır.
#
# @author    Mehmet Emin Ergenç
# @version   2.0.0
##

name: Maestro UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: maestro-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: 33
  ANDROID_TARGET: google_apis
  ANDROID_ARCH: x86_64

jobs:
  maestro-tests:
    name: Maestro UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed Maestro flows
        id: changed-flows
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- '.maestro/flows/**/*.yaml' | grep -v 'reusable/' || true)
          else
            CHANGED=""
          fi

          if [[ -n "$CHANGED" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "### Değişen flow dosyaları:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$CHANGED" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "### Tüm flow'lar koşulacak (değişiklik tespiti yapılamadı)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro tests on emulator
        id: maestro-run
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          target: ${{ env.ANDROID_TARGET }}
          arch: ${{ env.ANDROID_ARCH }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set +e

            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done;'
            adb install app/build/outputs/apk/debug/app-debug.apk

            export MAESTRO_DRIVER_STARTUP_TIMEOUT=120000
            mkdir -p maestro-output/debug

            echo "========================================="
            echo "  MAESTRO TEST KOŞUMU BAŞLIYOR"
            echo "========================================="

            maestro test \
              --env EMAIL=test@maestro.dev \
              --env PASSWORD=Test1234! \
              --env TEST_USER="Maestro Test User" \
              --format junit \
              --output maestro-output/results.xml \
              --debug-output maestro-output/debug \
              .maestro/flows/

            TEST_EXIT=$?

            echo "========================================="
            echo "  TEST KOŞUMU TAMAMLANDI (exit: $TEST_EXIT)"
            echo "========================================="

            if [[ -f maestro-output/results.xml ]]; then
              cp maestro-output/results.xml maestro-output/results-backup.xml
            fi

            exit $TEST_EXIT

      - name: Generate test summary
        if: always()
        run: |
          RESULTS="maestro-output/results.xml"

          echo "## Maestro UI Test Sonuçları" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ ! -f "$RESULTS" ]]; then
            echo "> **Test sonuç dosyası bulunamadı.** Emulator veya build aşamasında hata oluşmuş olabilir." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TOTAL=$(grep -c '<testcase' "$RESULTS" || echo "0")
          FAILURES=$(grep -c '<failure' "$RESULTS" || echo "0")
          ERRORS=$(grep -c '<error' "$RESULTS" || echo "0")
          PASSED=$((TOTAL - FAILURES - ERRORS))

          if [[ "$FAILURES" -eq 0 && "$ERRORS" -eq 0 ]]; then
            echo "### :white_check_mark: BAŞARILI — $PASSED/$TOTAL test geçti" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### :x: BAŞARISIZ — $PASSED/$TOTAL geçti, $((FAILURES + ERRORS)) başarısız" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Durum | Detay |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|-------|" >> "$GITHUB_STEP_SUMMARY"

          python3 - "$RESULTS" >> "$GITHUB_STEP_SUMMARY" <<'PYEOF'
          import sys, xml.etree.ElementTree as ET

          tree = ET.parse(sys.argv[1])
          for tc in tree.iter("testcase"):
              name = tc.get("name", "?")
              time_s = tc.get("time", "?")

              failure = tc.find("failure")
              error = tc.find("error")

              if failure is not None:
                  msg = (failure.get("message") or failure.text or "")[:120].replace("|", "/").replace("\n", " ")
                  print(f"| {name} | :x: FAIL | {msg} |")
              elif error is not None:
                  msg = (error.get("message") or error.text or "")[:120].replace("|", "/").replace("\n", " ")
                  print(f"| {name} | :warning: ERROR | {msg} |")
              else:
                  print(f"| {name} | :white_check_mark: PASS | {time_s}s |")
          PYEOF

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$FAILURES" -gt 0 || "$ERRORS" -gt 0 ]]; then
            echo "### Başarısız Test Detayları" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Debug screenshot ve video'lar **maestro-test-results** artifact'inde mevcuttur." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            echo "<details><summary>Tam hata çıktısı</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```xml' >> "$GITHUB_STEP_SUMMARY"
            grep -A 5 '<failure\|<error' "$RESULTS" | head -60 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "_Commit: \`${{ github.sha }}\` | Branch: \`${{ github.ref_name }}\` | Trigger: \`${{ github.event_name }}\`_" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results & debug output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-output/results.xml
            maestro-output/debug/
          retention-days: 30
          if-no-files-found: warn

      - name: Publish JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: maestro-output/results.xml
          fail_on_failure: true
          require_tests: true
          check_name: Maestro Test Results
          detailed_summary: true
          include_passed: true

      - name: Fail pipeline if tests failed
        if: steps.maestro-run.outcome == 'failure'
        run: |
          echo "::error::Maestro UI testleri başarısız oldu. Detaylar için Job Summary ve artifact'leri kontrol edin."
          exit 1
